<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodewar Tops - Ranking Geral (Automático)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f0f13; color: #ffffff;
            height: 100vh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column;
        }
        header {
            text-align: center; height: 10vh; display: flex;
            align-items: center; justify-content: center;
            background: linear-gradient(90deg, #1f1c2c 0%, #928dab 100%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-transform: uppercase;
        }
        header h1 {
            font-size: 3vh; color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
        .grid-container {
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr); gap: 1.5vh;
            padding: 1.5vh; height: 90vh; width: 100vw;
        }
        .card {
            background: #1c1c24; border-radius: 12px; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; border: 1px solid #333; position: relative; padding: 1vh;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            z-index: 10;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: #e63946;
        }
        .card-title {
            font-size: 2.2vh; color: #a8a8b3; text-transform: uppercase; margin-bottom: 1.5vh; font-weight: 600;
        }
        .card-player {
            font-size: 4.5vh; font-weight: bold; color: #fff; margin-bottom: 1vh; line-height: 1.1;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        .card-value {
            font-size: 3.5vh; color: #ffd700; font-weight: 700; background: rgba(0,0,0,0.3); padding: 0.5vh 1.5vh; border-radius: 8px;
        }
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4vh; color: #ffd700; text-align: center; z-index: 100;
        }

        .card:nth-child(1)::before { background: #457b9d; } 
        .card:nth-child(2)::before { background: #e63946; } 
        .card:nth-child(3)::before { background: #6a040f; } 
        .card:nth-child(4)::before { background: #f4a261; } 
        .card:nth-child(5)::before { background: #d00000; } 
        .card:nth-child(6)::before { background: #e76f51; } 
        .card:nth-child(7)::before { background: #9b5de5; } 
        .card:nth-child(8)::before { background: #00f5d4; } 
        .card:nth-child(9)::before { background: #fee440; } 
    </style>
</head>
<body>

    <header><h1>🏆 HALL DA FAMA - NODEWAR SUICIDE 🏆</h1></header>
    <div id="loading">Sincronizando com a Planilha...</div>
    <div class="grid-container" id="grid"></div>

    <script>
        function parseToNumber(val) {
            if (!val || val.trim() === "") return -Infinity;
            let str = String(val).trim();
            str = str.replace(/[^\d.,-]/g, ''); 
            str = str.replace(/\./g, '').replace(',', '.'); 
            const num = parseFloat(str);
            return isNaN(num) ? -Infinity : num;
        }

        // 1. O Link da sua planilha CSV gerado no "Publicar na Web"
        const googleCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTWXNm1v3X1xMg8t_or4J4m0jQ4i6jh56JwEBtWHplmPnvd7y0shwNT6DKHKIg3B-aSqkBrs_5vej9Q/pub?gid=1115049823&single=true&output=csv";

        // 2. O CORS PROXY (A Mágica). Ele limpa o bloqueio de segurança do Google.
        const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(googleCsvUrl);

        Papa.parse(proxyUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                const grid = document.getElementById('grid');
                const loading = document.getElementById('loading');

                if (!data || data.length === 0) {
                    loading.innerText = "Tabela vazia ou erro na leitura do CSV.";
                    return;
                }

                loading.style.display = 'none';

                // Pega os cabeçalhos
                const columns = Object.keys(data[0]);
                const nameCol = columns[0]; // Jogador
                const statsCols = columns.slice(1, 10); // 9 atributos de combate

                statsCols.forEach(stat => {
                    let maxVal = -Infinity;
                    let topPlayers = [];
                    let originalStr = "";

                    data.forEach(row => {
                        const playerName = row[nameCol];
                        const valStr = row[stat];

                        if(playerName && valStr) {
                            const valNum = parseToNumber(valStr);
                            
                            if (valNum > maxVal) {
                                maxVal = valNum;
                                topPlayers = [playerName];
                                originalStr = valStr; // Ex: 6.650.000,00
                            } else if (valNum === maxVal && valNum !== -Infinity) {
                                topPlayers.push(playerName);
                            }
                        }
                    });

                    // Cria os blocos HTML
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const playersDisplay = topPlayers.join(', ');
                    let fontSize = playersDisplay.length > 20 ? '2.5vh' : '4.5vh';

                    card.innerHTML = `
                        <div class="card-title">${stat}</div>
                        <div class="card-player" style="font-size: ${fontSize}">${playersDisplay || 'N/A'}</div>
                        <div class="card-value">${originalStr || '0'}</div>
                    `;
                    grid.appendChild(card);
                });
            },
            error: function(err) {
                console.error("Erro no PapaParse:", err);
                document.getElementById('loading').innerText = "Falha ao conectar via Proxy. O Google ainda está bloqueando.";
            }
        });
    </script>
</body>
</html>
